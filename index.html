function submitLife(type, editId) {
  setSyncStatus('💾 저장 중...');
  const title = v('f-title').trim();
  if (!title) { setSyncStatus('⚠️ 제목 필수', '#A0504A'); return; }
  // 새 엔트리에 order 자동 부여 (기존 최대값 + 1)
  const existingEntries = getDB().life[type] || [];
  const maxOrder = existingEntries.reduce((max, e) => Math.max(max, typeof e.order === 'number' ? e.order : -1), -1);
  const ratingInput = document.getElementById('f-rating-val');
  const rating = ratingInput && ratingInput.value !== '' ? parseFloat(ratingInput.value) : null;
  const entry = {
    title,
    category: v('f-category'),
    images: [...pendingImages],
    memo: v('f-memo').trim(),
    ...(rating !== null ? { rating } : {}),
    ...(editId ? {} : { order: maxOrder + 1 })
  };
  pendingImages = [];
  closeModal();
  try {
    if (editId) updateEntry('life', type, editId, entry);
    else addEntry('life', type, entry);
  } catch(e) {
    setSyncStatus('❌ ' + (e.message || e), '#A0504A');
  }
  setTimeout(() => renderLifePage(type), 100);
}

function openLifeDetail(type, id) {
  const entry = (getDB().life[type] || []).find(e => e.id === id);
  if (!entry) return;
  const imgs = entry.images || (entry.image ? [entry.image] : []);
  const imgHtml = imgs.length > 0
    ? `<div class="detail-field"><div class="detail-label">사진 (${imgs.length}장)</div>${imgs.map(src => `<img class="detail-image" src="${src}" style="margin-bottom:8px;">`).join('')}</div>`
    : '';
  const body = `
    ${field('카테고리', entry.category)}
    ${field('제목', entry.title)}
    ${imgHtml}
    ${field('메모', entry.memo)}
    ${type === 'foods' && entry.rating ? `<div class="detail-field"><div class="detail-label">별점</div><div class="detail-value">${renderStars(entry.rating)} <span class="star-score-text">${entry.rating} / 5</span></div></div>` : ''}

  openModal(entry.title || LIFE_LABELS[type], body);
}

function init() {
  // 탭 이벤트
  document.querySelectorAll('.stab').forEach(tab => {
    tab.addEventListener('click', () => goTo(tab.dataset.page));
  });

  // IntersectionObserver for reveal animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const delay = el.dataset.delay ? parseInt(el.dataset.delay) : 0;
        setTimeout(() => {
          el.classList.add('visible');
        }, delay);
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // 마지막 섹션/페이지 복원
  try {
    const lastSection = localStorage.getItem('lastSection') || 'study';
    const lastLifeTab = localStorage.getItem('lastLifeTab'); // switchSection 전에 먼저 읽기
    if (lastSection === 'life') {
      if (lastLifeTab) lifeState.currentTab = lastLifeTab; // switchSection이 이 값을 사용
      switchSection('life');
    } else {
      const last = localStorage.getItem('lastPage');
      if (last && document.getElementById('page-' + last)) goTo(last);
    }
  } catch(e) {}

  // Firebase 실시간 동기화 시작
  initFirestore();
}

      .map(e => [e.word, e.meaning, 3]);
  }
  if (filter === 4) {
    // '내가 추가한 단어'
    return getDB().english.vocab
      .filter(e => e.source !== '모르는 단어')
      .map(e => [e.word, e.meaning, 4]);
  }
  return all; // filter === 2: 전체
}

function ebsShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 완전 무작위로 N개 추출
function ebsPickRandom(arr, n) {
  return ebsShuffle(arr).slice(0, n);
}

function initEbsQuiz(filter) {
  if (filter !== undefined) ebsQuiz.filter = filter;
  const fullPool = ebsGetPool(ebsQuiz.filter);
  // 모든 카테고리: 50개 미만이면 전부, 50개 이상이면 랜덤 50개
  const picked = ebsPickRandom(fullPool, EBS_SESSION_SIZE);
  ebsQuiz.pool = picked;
  ebsQuiz.remaining = [...picked];
  ebsQuiz.current = null;
  ebsQuiz.known = 0;
  ebsQuiz.dunno = 0;
  ebsQuiz.flipped = false;
  ebsQuiz.wrongList = [];
  ebsNextCard();
}

function initEbsWrongOnly() {
  const picked = ebsShuffle(ebsQuiz.wrongList);
  ebsQuiz.pool = picked;
  ebsQuiz.remaining = [...picked];
  ebsQuiz.current = null;
  ebsQuiz.known = 0;
  ebsQuiz.dunno = 0;
  ebsQuiz.flipped = false;
  ebsQuiz.wrongList = [];
  ebsNextCard();
}

function ebsNextCard() {
  if (ebsQuiz.remaining.length === 0) {
    ebsQuiz.current = null;
    renderEbsQuiz();
    return;
  }
  ebsQuiz.current = ebsQuiz.remaining.shift();
  ebsQuiz.flipped = false;
  renderEbsQuiz();
}

function ebsFlip() {
  if (!ebsQuiz.current) return;
  ebsQuiz.flipped = true;
  const card = document.querySelector('.flashcard');
  if (card) card.classList.add('flipped');
  const hint = card && card.querySelector('.flashcard-hint');
  if (hint) hint.textContent = '단어 확인 ↑';
}

async function ebsSaveDunno(vocab) {
  const word    = vocab[0];
  const meaning = vocab[1];
  const srcName = vocab[2] === 0 ? 'EBS 수능특강 영어영역' : 'EBS 수능특강 영어독해연습';
  // 중복 체크: 이미 '모르는 단어'로 저장된 경우 스킵
  const db = getDB();
  const already = db.english.vocab.some(e => e.word === word && e.source === '모르는 단어');
  if (already) return;
  await addEntry('english', 'vocab', {
    word,
    meaning,
    pronunciation: '',
    example: '',
    source: '모르는 단어',
    origin: srcName,
  });
  // 단어 목록 새로고침
  renderEbsWordList('');
}

function ebsMark(known) {
  if (!ebsQuiz.current) return;
  const current = ebsQuiz.current;
  if (known) {
    ebsQuiz.known++;
  } else {
    ebsQuiz.dunno++;
    ebsQuiz.wrongList.push(current);
    // Firestore에 '모르는 단어'로 자동 저장
    ebsSaveDunno(current);
  }
  ebsNextCard();
}

function renderEbsQuiz() {
  const container = document.getElementById('ebs-quiz-container');
  if (!container) return;

  // Auto-init on first load
  if (ebsQuiz.pool.length === 0 && !ebsQuiz.current) {
    initEbsQuiz();
    return;
  }

  // FILTER_NAMES[filter값] = 표시 이름  (0=수능특강영어영역, 1=수능특강영어독해연습, 2=전체, 3=모르는단어)
  const FILTER_NAMES = ['수능특강 영어영역', '수능특강 영어독해연습', '전체', '📌 모르는 단어', '📝 내가 추가한 단어'];
  const SOURCE_NAMES = ['수능특강 영어영역', '수능특강 영어독해연습', '전체', '모르는 단어', '내가 추가한 단어'];
  const total = ebsQuiz.pool.length;
  const done = ebsQuiz.known + ebsQuiz.dunno;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // 탭 표시 순서: 전체(2) → 수능특강 영어영역(0) → 수능특강 영어독해연습(1) → 내가 추가한 단어(4) → 모르는 단어(3)
  const filterBtns = [2, 0, 1, 4, 3].map(f => {
    const label = FILTER_NAMES[f];
    const isSpecial = f === 3 || f === 4;
    const specialColor = f === 3 ? '#EF5350' : 'var(--english)';
    const activeStyle = isSpecial && ebsQuiz.filter === f ? `background:${specialColor};border-color:${specialColor};color:#fff;` : '';
    return `<button class="ebs-filter-btn ${ebsQuiz.filter === f ? 'active' : ''}" style="${activeStyle}" onclick="initEbsQuiz(${f})">${label}</button>`;
  }).join('');

  if (!ebsQuiz.current && ebsQuiz.pool.length === 0 && ebsQuiz.filter === 3) {
    // 모르는 단어가 아직 없는 경우
    container.innerHTML = `
      <div class="ebs-quiz-wrap">
        <div class="ebs-quiz-header"><span class="ebs-quiz-title">📚 EBS 단어 퀴즈</span></div>
        <div class="ebs-filter-row">${filterBtns}</div>
        <div class="ebs-complete-wrap">
          <div class="ebs-complete-icon">📭</div>
          <div class="ebs-complete-title">모르는 단어가 없어요</div>
          <div class="ebs-complete-sub">퀴즈에서 '✗ 몰라요'를 누르면<br>여기에 자동으로 모여요!</div>
          <div class="ebs-complete-btns">
            <button class="ebs-complete-btn retry" onclick="initEbsQuiz(2)">전체 퀴즈로 이동</button>
          </div>
        </div>
      </div>`;
    return;
  }

  if (!ebsQuiz.current && ebsQuiz.pool.length > 0) {
    // 완료 화면
    const sessionDunno = ebsQuiz.dunno;
    const isFromDunno = ebsQuiz.filter === 3;
    const completeTitle = isFromDunno
      ? `모르는 단어 ${total}개 완료!`
      : `50개 세션 완료!`;
    const retryBtn = isFromDunno
      ? `<button class="ebs-complete-btn retry" onclick="initEbsQuiz(3)">모르는 단어 다시 🔀</button>`
      : `<button class="ebs-complete-btn retry" onclick="initEbsQuiz()">새로 50개 뽑기 🔀</button>`;
    container.innerHTML = `
      <div class="ebs-quiz-wrap">
        <div class="ebs-quiz-header">
          <span class="ebs-quiz-title">📚 EBS 단어 퀴즈</span>
        </div>
        <div class="ebs-filter-row">${filterBtns}</div>
        <div class="ebs-complete-wrap">
          <div class="ebs-complete-icon">🎉</div>
          <div class="ebs-complete-title">${completeTitle}</div>
          <div class="ebs-complete-sub">
            알아요 <b style="color:#4CAF50">${ebsQuiz.known}개</b> · 몰라요 <b style="color:#EF5350">${sessionDunno}개</b>
            ${sessionDunno > 0 && !isFromDunno ? `<br><span style="font-size:11px;color:var(--text2);">몰라요 단어 ${sessionDunno}개가 '모르는 단어'에 저장됐어요 📌</span>` : ''}
          </div>
          <div class="ebs-complete-btns">
            ${retryBtn}
            ${ebsQuiz.wrongList.length > 0 ? `<button class="ebs-complete-btn retry-wrong" onclick="initEbsWrongOnly()">몰라요만 다시 (${ebsQuiz.wrongList.length}개)</button>` : ''}
          </div>
        </div>
      </div>`;
    return;
  }

  const word = ebsQuiz.current ? ebsQuiz.current[0] : '';
  const meaning = ebsQuiz.current ? ebsQuiz.current[1] : '';
  const src = ebsQuiz.current ? ebsQuiz.current[2] : 0;

  const cardHtml = `
    <div class="flashcard-scene" onclick="ebsFlip()">
      <div class="flashcard${ebsQuiz.flipped ? ' flipped' : ''}" style="min-height:160px;">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-hint">카드를 탭해서 뜻 확인</div>
          <div class="flashcard-word">${esc(word)}</div>
          <div class="flashcard-source-tag">${SOURCE_NAMES[src]}</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-hint">단어 확인 ↑</div>
          <div class="flashcard-meaning">${esc(meaning)}</div>
          <div class="flashcard-word-small">${esc(word)}</div>
        </div>
      </div>
    </div>`;

  container.innerHTML = `
    <div class="ebs-quiz-wrap">
      <div class="ebs-quiz-header">
        <span class="ebs-quiz-title">📚 EBS 단어 퀴즈</span>
        <button class="ebs-quiz-reset" onclick="initEbsQuiz()">처음부터</button>
      </div>
      <div class="ebs-filter-row">${filterBtns}</div>
      <div class="ebs-progress-row">
        <div class="ebs-progress-bar"><div class="ebs-progress-fill" style="width:${pct}%"></div></div>
        <span class="ebs-progress-text">${done}/${total}</span>
      </div>
      ${cardHtml}
      <div class="ebs-action-row">
        <button class="ebs-btn-dunno" onclick="ebsMark(false)">✗ 몰라요</button>
        <button class="ebs-btn-know" onclick="ebsMark(true)">✓ 알아요</button>
      </div>
      <div class="ebs-stats-row">
        <div class="ebs-stat know">
          <div class="ebs-stat-num">${ebsQuiz.known}</div>
          <div class="ebs-stat-label">알아요 ✓</div>
        </div>
        <div class="ebs-stat dunno">
          <div class="ebs-stat-num">${ebsQuiz.dunno}</div>
          <div class="ebs-stat-label">몰라요 ✗</div>
        </div>
        <div class="ebs-stat">
          <div class="ebs-stat-num">${ebsQuiz.remaining.length}</div>
          <div class="ebs-stat-label">남은 카드</div>
        </div>
      </div>
    </div>`;
}


// ===== EBS 단어 목록 (테이블) =====
const EBS_SOURCES = ['수능특강 영어영역', '수능특강 영어독해연습'];
const EBS_CHUNK = 50; // 소그룹 단위

function toggleEbsGroup(id) {
  const body = document.getElementById('ebs-wbody-' + id);
  const btn  = document.getElementById('ebs-wbtn-'  + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (btn) btn.textContent = open ? '－' : '＋';
}

function ebsMakeGroupHtml(groupId, label, words, isSearch, badgeColor) {
  if (words.length === 0) return '';

  let innerHtml;
  if (isSearch || words.length <= EBS_CHUNK) {
    const rows = words.map(v =>
      `<tr><td>${esc(typeof v === 'object' && v.word ? v.word : v[0])}</td><td>${esc(typeof v === 'object' && v.meaning ? v.meaning : v[1])}</td></tr>`
    ).join('');
    innerHtml = `<table class="ebs-word-table">${rows}</table>`;
  } else {
    const chunks = [];
    for (let i = 0; i < words.length; i += EBS_CHUNK) chunks.push(words.slice(i, i + EBS_CHUNK));
    innerHtml = chunks.map((chunk, cIdx) => {
      const subId = groupId + '_' + cIdx;
      const start = cIdx * EBS_CHUNK + 1;
      const end   = Math.min((cIdx + 1) * EBS_CHUNK, words.length);
      const rows  = chunk.map(v =>
        `<tr><td>${esc(typeof v === 'object' && v.word ? v.word : v[0])}</td><td>${esc(typeof v === 'object' && v.meaning ? v.meaning : v[1])}</td></tr>`
      ).join('');
      return `
        <div class="grammar-category" style="margin:4px 0;">
          <div class="grammar-category-header" style="background:var(--bg);border-radius:10px;padding:9px 12px;" onclick="toggleEbsGroup('${subId}')">
            <span class="grammar-category-label" style="font-size:12px;font-weight:600;">${start}–${end}번</span>
            <div class="grammar-category-meta">
              <span class="grammar-category-count">${chunk.length}개</span>
              <button class="grammar-toggle-btn" id="ebs-wbtn-${subId}" style="width:20px;height:20px;font-size:12px;">＋</button>
            </div>
          </div>
          <div class="ebs-wordlist-body" id="ebs-wbody-${subId}">
            <table class="ebs-word-table">${rows}</table>
          </div>
        </div>`;
    }).join('');
  }

  const headerStyle = badgeColor
    ? `style="border-left:3px solid ${badgeColor};"`
    : '';

  // 검색 중이면 그룹 자동으로 열기
  const bodyOpen = isSearch ? ' open' : '';
  const btnLabel = isSearch ? '－' : '＋';

  return `
    <div class="ebs-wordlist-group grammar-category">
      <div class="grammar-category-header" ${headerStyle} onclick="toggleEbsGroup('${groupId}')">
        <span class="grammar-category-label">${esc(label)}</span>
        <div class="grammar-category-meta">
          <span class="grammar-category-count">${words.length.toLocaleString()}개</span>
          <button class="grammar-toggle-btn" id="ebs-wbtn-${groupId}">${btnLabel}</button>
        </div>
      </div>
      <div class="ebs-wordlist-body${bodyOpen}" id="ebs-wbody-${groupId}">
        ${innerHtml}
      </div>
    </div>`;
}

function renderEbsWordList(q) {
  const container = document.getElementById('ebs-wordlist-container');
  if (!container) return;

  // 최초 1회만 전체 구조(input + results) 생성
  if (!container.querySelector('.ebs-wordlist-search')) {
    container.innerHTML = `
      <div class="ebs-wordlist-wrap">
        <input class="ebs-wordlist-search" type="text"
          placeholder="단어 검색... (예: assess, 평가)"
          oninput="ebsWordSearch(this.value)">
        <div id="ebs-wordlist-results"></div>
      </div>`;
  }

  // 검색어 설정 (초기화 시에만 q를 덮어씀)
  if (q !== undefined) {
    const input = container.querySelector('.ebs-wordlist-search');
    if (input && q === '') input.value = '';
  }

  ebsWordSearch(container.querySelector('.ebs-wordlist-search')?.value || '');
}

function ebsWordSearch(raw) {
  const results = document.getElementById('ebs-wordlist-results');
  if (!results) return;

  const query = (raw || '').trim().toLowerCase();
  const isSearch = query.length > 0;

  // ① '모르는 단어'
  const dunnoWords = getDB().english.vocab
    .filter(e => e.source === '모르는 단어' && (
      !query || (e.word||'').toLowerCase().includes(query) || (e.meaning||'').includes(query)
    ))
    .sort((a, b) => new Date(b.created) - new Date(a.created));

  // ② 내가 직접 추가한 단어
  const myWords = getDB().english.vocab
    .filter(e => e.source !== '모르는 단어' && (
      !query || (e.word||'').toLowerCase().includes(query) || (e.meaning||'').includes(query)
    ))
    .sort((a, b) => new Date(b.created) - new Date(a.created));

  // ③ EBS 단어장 그룹
  const ebsGroups = EBS_SOURCES.map((name, srcIdx) => ({
    name,
    words: EBS_VOCAB.filter(v => v[2] === srcIdx && (
      !query || v[0].toLowerCase().includes(query) || v[1].includes(query)
    ))
  }));

  const totalFiltered = dunnoWords.length + myWords.length + ebsGroups.reduce((s, g) => s + g.words.length, 0);

  // ── 모르는 단어 HTML ──
  let dunnoHtml = '';
  if (dunnoWords.length > 0) {
    const groupId = 'dunno';
    const rows = dunnoWords.map(e => `
      <tr>
        <td>${esc(e.word||'')}</td>
        <td>${esc(e.meaning||'')}</td>
        <td style="width:32px;text-align:right;">
          <button onclick="ebsDeleteDunno('${e.id}')" style="background:none;border:none;cursor:pointer;color:#EF5350;font-size:13px;padding:2px 4px;" title="삭제">✕</button>
        </td>
      </tr>`).join('');
    dunnoHtml = `
      <div class="ebs-wordlist-group grammar-category">
        <div class="grammar-category-header" style="border-left:3px solid #EF5350;" onclick="toggleEbsGroup('${groupId}')">
          <span class="grammar-category-label" style="color:#EF5350;">📌 모르는 단어</span>
          <div class="grammar-category-meta">
            <span class="grammar-category-count">${dunnoWords.length}개</span>
            <button class="grammar-toggle-btn" id="ebs-wbtn-${groupId}">＋</button>
          </div>
        </div>
        <div class="ebs-wordlist-body" id="ebs-wbody-${groupId}">
          <p style="font-size:11px;color:var(--text2);padding:6px 4px 2px;">'몰라요' 누른 단어가 자동 저장됩니다. ✕ 버튼으로 삭제 가능해요.</p>
          <table class="ebs-word-table">${rows}</table>
        </div>
      </div>`;
  }

  // ── 내가 추가한 단어 HTML (50개씩 접기/펼치기) ──
  let myVocabHtml = '';
  if (myWords.length > 0) {
    const gid = 'myvocab';
    let innerHtml;
    const makeRow = e => `
      <tr onclick="openDetail('english','vocab','${e.id}')" style="cursor:pointer;">
        <td>${esc(e.word||'')}</td>
        <td>${esc(e.meaning||'')}${e.source ? ' <span style=\"color:var(--text2);font-size:10px;\">' + esc(e.source) + '</span>' : ''}</td>
      </tr>`;
    if (isSearch || myWords.length <= EBS_CHUNK) {
      innerHtml = `<table class="ebs-word-table">${myWords.map(makeRow).join('')}</table>`;
    } else {
      const chunks = [];
      for (let i = 0; i < myWords.length; i += EBS_CHUNK) chunks.push(myWords.slice(i, i + EBS_CHUNK));
      innerHtml = chunks.map((chunk, cIdx) => {
        const subId = gid + '_' + cIdx;
        const start = cIdx * EBS_CHUNK + 1;
        const end = Math.min((cIdx + 1) * EBS_CHUNK, myWords.length);
        return `
          <div class="grammar-category" style="margin:4px 0;">
            <div class="grammar-category-header" style="background:var(--bg);border-radius:10px;padding:9px 12px;" onclick="toggleEbsGroup('${subId}')">
              <span class="grammar-category-label" style="font-size:12px;font-weight:600;">${start}–${end}번</span>
              <div class="grammar-category-meta">
                <span class="grammar-category-count">${chunk.length}개</span>
                <button class="grammar-toggle-btn" id="ebs-wbtn-${subId}" style="width:20px;height:20px;font-size:12px;">＋</button>
              </div>
            </div>
            <div class="ebs-wordlist-body" id="ebs-wbody-${subId}">
              <table class="ebs-word-table">${chunk.map(makeRow).join('')}</table>
            </div>
          </div>`;
      }).join('');
    }
    const bodyOpen = isSearch ? ' open' : '';
    const btnLabel = isSearch ? '－' : '＋';
    myVocabHtml = `
      <div class="ebs-wordlist-group grammar-category">
        <div class="grammar-category-header" style="border-left:3px solid var(--english);" onclick="toggleEbsGroup('${gid}')">
          <span class="grammar-category-label" style="color:var(--english);">📝 내가 추가한 단어</span>
          <div class="grammar-category-meta">
            <span class="grammar-category-count">${myWords.length}개</span>
            <button class="grammar-toggle-btn" id="ebs-wbtn-${gid}">${btnLabel}</button>
          </div>
        </div>
        <div class="ebs-wordlist-body${bodyOpen}" id="ebs-wbody-${gid}">
          ${innerHtml}
        </div>
      </div>`;
  }

  const ebsHtml = ebsGroups.map((g, gIdx) =>
    ebsMakeGroupHtml('src' + gIdx, g.name, g.words, isSearch, null)
  ).join('');

  results.innerHTML = totalFiltered === 0
    ? `<div class="ebs-no-result">검색 결과가 없어요</div>`
    : dunnoHtml + myVocabHtml + ebsHtml;
}

async function ebsDeleteDunno(id) {
  await deleteEntry('english', 'vocab', id);
  ebsWordSearch(document.querySelector('.ebs-wordlist-search')?.value || '');
}

let plannerSelDate = new Date();
let plannerCalY = plannerSelDate.getFullYear();
let plannerCalM = plannerSelDate.getMonth();
let plannerCache = {}; // 인메모리 캐시: key → data

function plannerDayKey(d) {
  return `pd_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function plannerDayLoad(d) {
  const key = plannerDayKey(d);
  const saved = plannerCache[key] || null;
  if (!saved) return { goal: '', comment: '', totalTime: '', study: [], etc: [] };
  // 구버전 호환 (tasks → study로 이전)
  if (saved.tasks && !saved.study) { saved.study = saved.tasks; delete saved.tasks; }
  if (!saved.study) saved.study = [];
  if (!saved.etc)   saved.etc   = [];
  return JSON.parse(JSON.stringify(saved)); // 깊은 복사
}

function plannerDaySave(d, data) {
  const key = plannerDayKey(d);
  plannerCache[key] = JSON.parse(JSON.stringify(data));
  // entries 컬렉션에 날짜 key를 문서 ID로 사용해서 set (upsert)
  const saveData = { ...data, subject: 'planner', type: 'day', dateKey: key, id: key };
  fsDB.collection('entries').doc(key).set(saveData)
    .catch(e => console.error('planner save error', e));
}

// localStorage 기존 데이터 → Firestore 마이그레이션 (1회만 실행)
function plannerMigrateLocalStorage() {
  if (localStorage.getItem('planner_migrated')) return;
  const batch = fsDB.batch();
  let hasMig = false;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('pd_')) {
      try {
        const val = JSON.parse(localStorage.getItem(k));
        if (val) {
          const saveData = { ...val, subject: 'planner', type: 'day', dateKey: k, id: k };
          batch.set(fsDB.collection('entries').doc(k), saveData);
          hasMig = true;
        }
      } catch(e) {}
    }
  }
  if (hasMig) {
    batch.commit()
      .then(() => localStorage.setItem('planner_migrated', '1'))
      .catch(e => console.error('planner migration error', e));
  } else {
    localStorage.setItem('planner_migrated', '1');
  }
}

function plannerNavMonth(dir) {
  plannerCalM += dir;
  if (plannerCalM < 0)  { plannerCalM = 11; plannerCalY--; }
  if (plannerCalM > 11) { plannerCalM = 0;  plannerCalY++; }
  renderPlannerCal();
}

function plannerSelectDate(y, m, d) {
  plannerSelDate = new Date(y, m, d);
  renderPlannerCal();
  renderPlannerSheet();
}

function plannerSaveField(field, value) {
  const data = plannerDayLoad(plannerSelDate);
  data[field] = value;
  plannerDaySave(plannerSelDate, data);
}

function plannerAddTask(section) {
  const data = plannerDayLoad(plannerSelDate);
  data[section].push({ id: Date.now(), text: '', done: false });
  plannerDaySave(plannerSelDate, data);
  renderPlannerSheet();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`.planner-task-input[data-sec="${section}"]`);
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 30);
}

function plannerToggleTask(section, id) {
  const data = plannerDayLoad(plannerSelDate);
  const t = data[section].find(t => t.id === id);
  if (t) t.done = !t.done;
  plannerDaySave(plannerSelDate, data);
  renderPlannerSheet();
}

function plannerDeleteTask(section, id) {
  const data = plannerDayLoad(plannerSelDate);
  data[section] = data[section].filter(t => t.id !== id);
  plannerDaySave(plannerSelDate, data);
  renderPlannerSheet();
}

function plannerUpdateTask(section, id, text) {
  const data = plannerDayLoad(plannerSelDate);
  const t = data[section].find(t => t.id === id);
  if (t) { t.text = text; plannerDaySave(plannerSelDate, data); }
}

function renderPlanner() {
  const container = document.getElementById('planner-content');
  if (!container) return;
  container.innerHTML = `<div id="planner-cal-area"></div><div id="planner-sheet-area"></div>`;
  renderPlannerCal();
  renderPlannerSheet();
}

function renderPlannerCal() {
  const wrap = document.getElementById('planner-cal-area');
  if (!wrap) return;

  const today = new Date();
  const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DN = ['일','월','화','수','목','금','토'];
  const firstDay = new Date(plannerCalY, plannerCalM, 1).getDay();
  const daysInMonth = new Date(plannerCalY, plannerCalM + 1, 0).getDate();

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="planner-cal-cell"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear()===plannerCalY && today.getMonth()===plannerCalM && today.getDate()===d;
    const isSel   = plannerSelDate.getFullYear()===plannerCalY && plannerSelDate.getMonth()===plannerCalM && plannerSelDate.getDate()===d;
    const hasData = !!plannerCache[plannerDayKey(new Date(plannerCalY, plannerCalM, d))];
    const cls = `planner-cal-cell${isToday?' today':''}${isSel?' selected':''}${hasData&&!isSel?' has-data':''}`;
    cells += `<div class="${cls}" onclick="plannerSelectDate(${plannerCalY},${plannerCalM},${d})">${d}</div>`;
  }

  wrap.innerHTML = `
    <div class="planner-cal">
      <div class="planner-cal-header">
        <button class="planner-cal-nav" onclick="plannerNavMonth(-1)">‹</button>
        <span class="planner-cal-title">${plannerCalY}년 ${MN[plannerCalM]}</span>
        <button class="planner-cal-nav" onclick="plannerNavMonth(1)">›</button>
      </div>
      <div class="planner-cal-days">
        ${DN.map((d,i)=>`<div class="planner-cal-dayname${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('')}
      </div>
      <div class="planner-cal-grid">${cells}</div>
    </div>`;
}

function renderPlannerSheet() {
  const wrap = document.getElementById('planner-sheet-area');
  if (!wrap) return;

  const data = plannerDayLoad(plannerSelDate);
  const d = plannerSelDate;
  const DNAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const suneung = new Date(2026, 10, 19);
  const sel0 = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const ddayN = Math.round((suneung - sel0) / (1000*60*60*24));
  const ddayStr = ddayN > 0 ? `D-${ddayN}` : ddayN === 0 ? 'D-DAY' : `D+${Math.abs(ddayN)}`;

  const allTasks = [...data.study, ...data.etc];
  const doneCount = allTasks.filter(t => t.done).length;
  const total = allTasks.length;
  const pct = total > 0 ? Math.round(doneCount/total*100) : 0;

  const makeRows = (section, placeholder) => data[section].map(t => `
    <div class="planner-task-row${t.done?' done':''}">
      <button class="planner-task-check" onclick="plannerToggleTask('${section}',${t.id})">${t.done?'✓':''}</button>
      <input class="planner-task-input" data-sec="${section}" data-id="${t.id}" type="text" value="${esc(t.text)}"
        placeholder="${placeholder}"
        onblur="plannerUpdateTask('${section}',${t.id},this.value)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();plannerUpdateTask('${section}',${t.id},this.value);plannerAddTask('${section}');}">
      <button class="planner-task-del" onclick="plannerDeleteTask('${section}',${t.id})">✕</button>
    </div>`).join('');

  const blankStudy = Array(Math.max(0, 5 - data.study.length)).fill(0)
    .map(() => `<div class="planner-ruled-line"></div>`).join('');
  const blankEtc = Array(Math.max(0, 4 - data.etc.length)).fill(0)
    .map(() => `<div class="planner-ruled-line"></div>`).join('');

  wrap.innerHTML = `
    <div class="planner-sheet">
      <div class="planner-sheet-top">
        <div class="planner-sheet-date-col">
          <div class="planner-sheet-daynum">${d.getDate()}</div>
          <div class="planner-sheet-dayname">${DNAMES[d.getDay()]}</div>
        </div>
        <div class="planner-sheet-fields">
          <div class="planner-sheet-row">
            <div class="planner-sheet-cell wide">
              <div class="planner-field-label">TODAY'S GOAL</div>
              <textarea class="planner-field-area" rows="2" placeholder="오늘의 목표..."
                onchange="plannerSaveField('goal',this.value)">${esc(data.goal)}</textarea>
            </div>
            <div class="planner-sheet-cell narrow">
              <div class="planner-field-label">D-DAY</div>
              <div class="planner-field-dday">${ddayStr}</div>
            </div>
          </div>
          <div class="planner-sheet-row">
            <div class="planner-sheet-cell wide">
              <div class="planner-field-label">COMMENT</div>
              <textarea class="planner-field-area" rows="2" placeholder="오늘 하루 코멘트..."
                onchange="plannerSaveField('comment',this.value)">${esc(data.comment)}</textarea>
            </div>
            <div class="planner-sheet-cell narrow">
              <div class="planner-field-label">TOTAL TIME</div>
              <input class="planner-field-input" type="text" placeholder="예) 8h 30m"
                value="${esc(data.totalTime)}"
                onchange="plannerSaveField('totalTime',this.value)">
            </div>
          </div>
        </div>
      </div>
      <div class="planner-sheet-body">
        ${total > 0 ? `<div class="planner-progress-bar"><div class="planner-progress-fill" style="width:${pct}%"></div></div>` : ''}

        <!-- STUDY 섹션 -->
        <div class="planner-task-header">
          <span class="planner-field-label" style="margin:0;">STUDY${data.study.length>0?` · ${data.study.filter(t=>t.done).length}/${data.study.length}`:''}</span>
          <button class="planner-task-add-btn" onclick="plannerAddTask('study')">+ 추가</button>
        </div>
        ${makeRows('study', '공부 할 일 입력...')}
        ${data.study.length === 0 ? `<div class="planner-no-tasks" style="padding:10px 14px;">공부 계획을 추가해봐!</div>` : ''}
        ${blankStudy}

        <!-- ETC 섹션 -->
        <div class="planner-task-header" style="border-top:1.5px solid #c6c09c;">
          <span class="planner-field-label" style="margin:0;">ETC${data.etc.length>0?` · ${data.etc.filter(t=>t.done).length}/${data.etc.length}`:''}</span>
          <button class="planner-task-add-btn" onclick="plannerAddTask('etc')">+ 추가</button>
        </div>
        ${makeRows('etc', '기타 할 일 입력...')}
        ${data.etc.length === 0 ? `<div class="planner-no-tasks" style="padding:10px 14px;">기타 할 일을 추가해봐!</div>` : ''}
        ${blankEtc}
      </div>
    </div>`;
}
